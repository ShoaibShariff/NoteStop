
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Note Stop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: rgb(232, 255, 198);
    
    }

    /* Navbar */
    nav {
      background: rgba(13, 27, 42, 0.8);
      backdrop-filter: blur(4px);
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 20px 0px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }

    nav h1 {
      margin: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 15px;
      margin-right: 15px;
    }
        /* HERO SECTION WITH BACKGROUND */
    .hero {
      height: 70vh;
      background: url('IMG_3415.jpg') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      position: relative;
    }

    /* Dark overlay */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: 60px;
      font-family: Arial, Helvetica, sans-serif;
      margin: 5px 0;
      color: #f7fffc;
    }

    .hero p {
      font-size: 22px;
      font-family: 'Times New Roman', Times, serif;
      color: #f6f2f2;
    }

    /* Cards Section */
    .container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 20px;
      text-decoration: none;
      color: black;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      background: #fce4ec;
    }

    .icon {
      font-size: 40px;
      margin-right: 20px;
    }

    .card h3 {
      margin: 0;
      font-size: 22px;
      color: #2f391a;
    }

    .card p {
      margin: 5px 0 0;
      color: #555;
    }

    /* Footer */
    footer {
      background: #0d1b2a;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 50px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .card {
        flex-direction: column;
        text-align: center;
      }

      .icon {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h1><a href="index.html">NoteStop</a></h1>
    <div>
      <a href="notes.html">Notes</a>
      <a href="#">Important</a>
      <a href="#">PYQs</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="hero">
    <div class="hero-content">
      <h1>NOTESTOP</h1>
      <p>Your Smart Study Hub</p>
      
    </div>
  </div>


  <!-- Cards -->
  <div class="container">

    <a href="notes.html" class="card">
      <div class="icon">📄</div>
      <div>
        <h3>Notes</h3>
        <p>Access subject-wise notes easily</p>
      </div>
    </a>

    <a href="#" class="card">
      <div class="icon">⭐</div>
      <div>
        <h3>Important Questions</h3>
        <p>Most expected exam questions</p>
      </div>
    </a>

    <a href="#" class="card">
      <div class="icon">📚</div>
      <div>
        <h3>Previous Year Papers</h3>
        <p>Practice with real exam papers</p>
      </div>
    </a>

  </div>

  <!-- Footer -->
  <footer>
    @ NoteStop 2026 | Made for Students
  </footer>

</body>
</html>
