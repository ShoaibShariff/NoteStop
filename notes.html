<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Note Stop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('IMG_3415.jpg')
    }

    /* Navbar */
    nav {
      background: rgba(13, 27, 42, 0.8);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      align-items: center;
      z-index: 1000;

    }

    nav h2 {
      margin: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 15px;
    }

    /* Cards Section */
    .container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: black;
      box-shadow: 0 4px 10px rgba(36, 49, 5, 0.1);
    }

    .card h3 {
      margin: 0;
      font-size: 22px;
    }

    .card p {
      margin: 5px 0 0;
      color: #555;
    }

    /* Footer */
    footer {
      background: #0d1b2a;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 200px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .card {
        flex-direction: column;
        text-align: center;
      }

      .icon {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h2><a href="index.html">NoteStop</a></h2>
    <div> <center><h2>Notes</h2></center></div>
    <div>
      <a href="#">Important</a>
      <a href="#">PYQs</a>
    </div>
  </nav>

  <!-- Cards -->
  <div class="container">

    <a href="viewer.html?file=test.pdf" class="card">
      <div>
        <h3> Data Structures </h3>
        <p>Access subject-wise notes easily</p>
      </div>
    </a>

    <a href="viewer.html?file=test1.pdf" class="card">
      <div>
        <h3> OOPs in JAVA </h3>
        <p>Most expected exam questions</p>
      </div>
    </a>

    <a href="viewer.html" class="card">
      <div>
        <h3>Operating Systems </h3>
        <p>Practice with real exam papers</p>
      </div>
    </a>

  </div>

  <!-- Footer -->
  <footer>
    @ NoteStop 2026 | Made for Students
  </footer>

</body>
</html>
