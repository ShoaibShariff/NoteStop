<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> PDF Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

    @media (max-width: 768px) {
      .card {
        flex-direction: column;
        text-align: center;
      }
    }

  </style>
</head>
<body>


  <iframe id="pdfViewer"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfFile = params.get('file');

    if (pdfFile) { 
      // Just open the raw file directly (no ?toolbar=1 or Chrome UI)
      document.getElementById("pdfViewer").src = pdfFile + "#toolbar=0&navpanes=0&scrollbar=1";
    } else {
      document.body.innerHTML = "<h2>No PDF selected</h2>";
    }
  </script>

</body>
</html>
